<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشيت المركزي — مقياس الابتكار</title>
    <style>
        /* Effra font (خط الهوية الرسمي) — fallback: IBM Plex Sans Arabic */
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

        :root {
            /* === ألوان الهوية الرسمية === */
            --color-dark-blue: #08395C;
            --color-blue: #0076B1;
            --color-yellow: #F5B335;
            --color-orange: #FF5F2D;
            --color-green: #00B982;
            --color-turquoise: #00B1C7;
            --color-red-purple: #AB2C72;
            --color-grey: #90ABB6;

            /* === ألوان تطبيقية === */
            --primary: var(--color-dark-blue);
            --accent: var(--color-blue);
            --highlight: var(--color-turquoise);

            /* === خلفيات ونصوص === */
            --bg: #F7F9FB;
            --bg-subtle: #EEF3F7;
            --bg-card: #FFFFFF;
            --text: var(--color-dark-blue);
            --text-light: #5B7280;
            --text-muted: #8A9AA7;
            --border: #DCE4EA;
            --border-soft: #E8EDF1;

            /* === أحمر تحذيري فقط === */
            --danger: #C53030;
            --success: var(--color-green);

            /* === ظلال وتنسيق === */
            --shadow-sm: 0 1px 3px rgba(8, 57, 92, 0.06);
            --shadow: 0 4px 16px rgba(8, 57, 92, 0.08);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);

            --font: 'Effra', 'IBM Plex Sans Arabic', 'Segoe UI', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .top-bar {
            background: var(--primary);
            color: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 10px rgba(8, 57, 92, 0.15);
            border-bottom: 3px solid var(--accent);
        }
        .top-bar h1 {
            font-size: 19px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }
        .top-bar h1::before {
            content: 'IA';
            background: #fff;
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            letter-spacing: 0;
        }
        .top-bar .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #005d8a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 118, 177, 0.25); }
        .btn-outline { background: #fff; color: var(--primary); border: 1px solid #fff; }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.9); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #9B1C1C; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(197, 48, 48, 0.22); }
        .del-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--danger);
            border-radius: var(--radius-sm);
            padding: 4px 10px;
            font-size: 12px;
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .del-btn:hover { background: rgba(197, 48, 48, 0.08); border-color: var(--danger); }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            padding: 24px 32px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border-soft);
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 3px;
            height: 100%;
            background: var(--accent);
        }
        .stat-card.show { opacity: 1; transform: translateY(0); }
        .stat-card:hover { box-shadow: var(--shadow); }
        .stat-card.tint-yellow::before { background: var(--color-yellow); }
        .stat-card.tint-turquoise::before { background: var(--color-turquoise); }
        .stat-card.tint-red-purple::before { background: var(--color-red-purple); }
        .stat-label { font-size: 13px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
        .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* Table */
        .table-wrap { padding: 0 32px 32px; }
        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .table-header h2 { font-size: 18px; font-weight: 600; color: var(--primary); letter-spacing: -0.2px; }
        .search-box {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font);
            font-size: 14px;
            width: 260px;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            background: #fff;
            color: var(--primary);
        }
        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 118, 177, 0.12);
        }

        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead {
            background: var(--primary);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        th {
            padding: 12px 10px;
            font-weight: 600;
            text-align: right;
            white-space: nowrap;
            font-size: 13px;
            letter-spacing: 0.1px;
        }
        td {
            padding: 11px 10px;
            border-bottom: 1px solid var(--border-soft);
            text-align: right;
            vertical-align: middle;
            transition: background 0.15s ease;
        }
        tr:hover td { background: rgba(0, 118, 177, 0.035); }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
        }
        /* ألقاب — ألوان الهوية */
        .badge-organizer { background: rgba(8, 57, 92, 0.1); color: var(--primary); }
        .badge-practical { background: rgba(245, 179, 53, 0.18); color: #7A4A00; }
        .badge-innovator { background: rgba(0, 177, 199, 0.15); color: #006578; }

        .score-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 13px;
            color: #fff;
        }
        /* نقاط — Orange (منخفض) / Yellow (متوسط) / Turquoise (مرتفع) */
        .sc-1 { background: var(--color-orange); }
        .sc-2 { background: var(--color-yellow); color: #5A3A00; }
        .sc-3 { background: var(--color-turquoise); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .result-count {
            font-size: 13px;
            color: var(--text-light);
            padding: 8px 0;
        }

        /* ══════ RESPONSIVE — TABLET (max 768px) ══════ */
        @media (max-width: 768px) {
            .top-bar { padding: 14px 20px; }
            .top-bar h1 { font-size: 17px; }
            .stats { padding: 16px 20px; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .table-wrap { padding: 0 20px 20px; }
            .search-box { width: 200px; }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            table { min-width: 800px; }
        }

        /* ══════ RESPONSIVE — MOBILE (max 480px) ══════ */
        @media (max-width: 480px) {
            .top-bar { padding: 12px 14px; gap: 10px; }
            .top-bar h1 { font-size: 15px; gap: 6px; }
            .top-bar .actions { width: 100%; }
            .top-bar .actions .btn { flex: 1; padding: 10px 12px; font-size: 13px; }
            .stats { padding: 12px 14px; gap: 8px; grid-template-columns: repeat(2, 1fr); }
            .stat-card { padding: 14px; border-radius: 10px; }
            .stat-value { font-size: 24px; }
            .stat-label { font-size: 12px; }
            .stat-sub { font-size: 11px; }
            .stat-card:nth-child(5) { grid-column: 1 / -1; }
            .table-wrap { padding: 0 14px 14px; }
            .table-header h2 { font-size: 16px; }
            .search-box { width: 100%; font-size: 14px; padding: 10px 14px; }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
            table { min-width: 750px; font-size: 12px; }
            th { padding: 10px 8px; font-size: 11px; }
            td { padding: 8px 6px; }
            .score-cell { width: 24px; height: 24px; font-size: 11px; border-radius: 5px; }
            .badge { font-size: 11px; padding: 2px 8px; }
            .result-count { font-size: 12px; }
        }

        /* ══════ RESPONSIVE — SMALL MOBILE (max 360px) ══════ */
        @media (max-width: 360px) {
            .top-bar { padding: 10px 10px; }
            .top-bar h1 { font-size: 14px; }
            .stats { padding: 10px; gap: 6px; }
            .stat-card { padding: 10px; }
            .stat-value { font-size: 20px; }
            .table-wrap { padding: 0 10px 10px; }
            table { min-width: 700px; font-size: 11px; }
        }

        /* ══════ Safe area for notch/home indicator ══════ */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            body { padding-bottom: env(safe-area-inset-bottom); }
        }

        @media print {
            body { background: #fff; font-size: 11px; color: var(--primary); }
            .top-bar .actions, .search-box, .no-print { display: none !important; }
            .top-bar {
                background: #fff;
                color: var(--primary);
                border-bottom: 3px solid var(--accent);
                padding: 8px 16px;
                position: static;
                box-shadow: none;
            }
            .top-bar h1 { color: var(--primary); font-size: 16px; }
            .top-bar h1::before { background: var(--primary); color: #fff; }
            .stats { padding: 8px 16px; gap: 8px; }
            .stat-card { padding: 10px; border: 1px solid var(--border); opacity: 1; transform: none; box-shadow: none; }
            .stat-value { font-size: 20px; color: var(--primary); }
            .table-wrap { padding: 0 16px 16px; }
            table { font-size: 10px; }
            th { background: var(--primary); color: #fff; padding: 6px 4px; }
            td { padding: 5px 4px; }
            thead { position: static; }
            @page { size: landscape; margin: 10mm; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>الشيت المركزي — نتائج مقياس الابتكار</h1>
    <div class="actions">
        <button class="btn btn-outline" onclick="loadData()">تحديث</button>
        <button class="btn btn-primary" onclick="window.print()">طباعة</button>
        <button class="btn btn-danger no-print" onclick="confirmDeleteAll()">حذف الكل</button>
    </div>
</div>

<div class="stats" id="stats-area">
    <div class="stat-card" data-d="0">
        <div class="stat-label">إجمالي المشاركين</div>
        <div class="stat-value" id="st-total">—</div>
    </div>
    <div class="stat-card tint-turquoise" data-d="1">
        <div class="stat-label">متوسط الدرجات</div>
        <div class="stat-value" id="st-avg">—</div>
        <div class="stat-sub">من 15</div>
    </div>
    <div class="stat-card" data-d="2">
        <div class="stat-label">المنظم</div>
        <div class="stat-value" id="st-organizer">—</div>
    </div>
    <div class="stat-card tint-yellow" data-d="3">
        <div class="stat-label">العملي</div>
        <div class="stat-value" id="st-practical">—</div>
    </div>
    <div class="stat-card tint-red-purple" data-d="4">
        <div class="stat-label">المبتكر</div>
        <div class="stat-value" id="st-innovator">—</div>
    </div>
</div>

<div class="table-wrap">
    <div class="table-header">
        <h2>جميع النتائج</h2>
        <input type="text" class="search-box no-print" placeholder="بحث بالاسم..." oninput="filterTable(this.value)">
    </div>
    <div class="result-count no-print" id="result-count"></div>
    <div class="table-container" id="table-container">
        <div class="loading-state">جارٍ التحميل...</div>
    </div>
</div>

<script>
const SKILLS = ['ربط الأفكار','التجريب والمخاطرة','الاستكشاف والبحث','التكيف والمرونة','الفضول والتساؤل'];
let allAttempts = [];

// ── Count-up ─────────────────────────────────────────────────────────────────
function countUp(el, target, duration = 600) {
    const isFloat = String(target).includes('.');
    let start = 0;
    const startTime = performance.now();
    function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        const current = start + (target - start) * ease;
        el.textContent = isFloat ? current.toFixed(1) : Math.round(current);
        if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

// ── Reveal stat cards ────────────────────────────────────────────────────────
function revealStats() {
    document.querySelectorAll('.stat-card').forEach(card => {
        const d = parseInt(card.dataset.d || 0);
        setTimeout(() => card.classList.add('show'), 60 + d * 100);
    });
}

// ── Load Data ────────────────────────────────────────────────────────────────
async function loadData() {
    try {
        const statsRes = await fetch('/api/stats');
        const stats = await statsRes.json();

        revealStats();

        // Count-up animation for stats
        setTimeout(() => {
            countUp(document.getElementById('st-total'), stats.total_attempts);
            countUp(document.getElementById('st-avg'), stats.average_score);
            countUp(document.getElementById('st-organizer'), stats.titles_distribution['المنظم'] || 0);
            countUp(document.getElementById('st-practical'), stats.titles_distribution['العملي'] || 0);
            countUp(document.getElementById('st-innovator'), stats.titles_distribution['المبتكر'] || 0);
        }, 200);

        const attRes = await fetch('/api/attempts?limit=500');
        const attData = await attRes.json();
        allAttempts = attData.attempts;
        renderTable(allAttempts);
    } catch(e) {
        revealStats();
        document.getElementById('table-container').innerHTML =
            '<div class="empty-state"><div class="icon">⚠</div><p>تعذر الاتصال بالسيرفر. تأكد من تشغيل server.pyy</p></div>';
    }
}

function renderTable(data) {
    const countEl = document.getElementById('result-count');
    if (!data || data.length === 0) {
        document.getElementById('table-container').innerHTML =
            '<div class="empty-state"><div class="icon">—</div><p>لا توجد نتائج بعد</p></div>';
        countEl.textContent = '';
        return;
    }

    countEl.textContent = `عرض ${data.length} نتيجة`;

    let html = `<table>
        <thead><tr>
            <th>#</th><th>الاسم</th>
            <th>ربط الأفكار</th><th>التجريب</th><th>الاستكشاف</th><th>التكيف</th><th>الفضول</th>
            <th>المجموع</th><th>اللقب</th><th>مهارة التطوير</th><th>التاريخ</th><th class="no-print">حذف</th>
        </tr></thead><tbody>`;

    data.forEach((a, i) => {
        const bc = a.innovation_title === 'المنظم' ? 'badge-organizer' :
                   a.innovation_title === 'العملي' ? 'badge-practical' : 'badge-innovator';
        html += `<tr>
            <td>${i+1}</td>
            <td style="font-weight:600;white-space:nowrap">${a.full_name}</td>
            <td><span class="score-cell sc-${a.q1_score}">${a.q1_score}</span></td>
            <td><span class="score-cell sc-${a.q2_score}">${a.q2_score}</span></td>
            <td><span class="score-cell sc-${a.q3_score}">${a.q3_score}</span></td>
            <td><span class="score-cell sc-${a.q4_score}">${a.q4_score}</span></td>
            <td><span class="score-cell sc-${a.q5_score}">${a.q5_score}</span></td>
            <td style="font-weight:800;font-size:15px;color:var(--primary)">${a.total_score}/15</td>
            <td><span class="badge ${bc}">${a.innovation_title}</span></td>
            <td style="font-size:12px">${a.development_skill}</td>
            <td style="font-size:11px;color:var(--text-light);white-space:nowrap">${formatDate(a.created_at)}</td>
            <td class="no-print"><button class="del-btn" onclick="deleteOne(${a.id})">حذف</button></td>
        </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('table-container').innerHTML = html;
}

function filterTable(query) {
    if (!query.trim()) { renderTable(allAttempts); return; }
    const filtered = allAttempts.filter(a => a.full_name.includes(query));
    renderTable(filtered);
}

function formatDate(dt) {
    if (!dt) return '—';
    try {
        const d = new Date(dt);
        return d.toLocaleDateString('ar-SA', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });
    } catch(e) { return dt; }
}

async function deleteOne(id) {
    if (!confirm('هل تريد حذف هذا السجل؟')) return;
    try {
        await fetch(`/api/attempts/${id}`, { method: 'DELETE' });
        loadData();
    } catch(e) { alert('فشل الحذف'); }
}

async function confirmDeleteAll() {
    if (!confirm('⚠️ هل أنت متأكد من حذف جميع البيانات؟\nهذا الإجراء لا يمكن التراجع عنه.')) return;
    if (!confirm('تأكيد نهائي: سيتم حذف جميع النتائج المسجلة. متأكد؟')) return;
    try {
        await fetch('/api/attempts/all', { method: 'DELETE' });
        loadData();
    } catch(e) { alert('فشل الحذف'); }
}

loadData();
</script>

</body>
</html>
